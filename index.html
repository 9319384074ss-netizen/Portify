<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portify</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:#0a0a0a;
color:#fff;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%, #00c9ff33, transparent 40%),
radial-gradient(circle at 80% 70%, #764ba233, transparent 40%);
filter:blur(120px);
z-index:-1;
}

nav{
display:flex;
justify-content:space-between;
padding:20px 50px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
}

.logo{font-size:22px;font-weight:700;}

button{
background:#00c9ff;
border:none;
padding:10px 20px;
border-radius:20px;
cursor:pointer;
}

/* FORM */
.form{
width:90%;
max-width:600px;
margin:20px auto;
display:flex;
flex-direction:column;
gap:12px;
}

input, textarea{
padding:10px;
border-radius:10px;
border:none;
}

/* UPLOAD */
.upload-box{
margin:30px auto;
padding:20px;
border:2px dashed #444;
border-radius:20px;
width:80%;
max-width:500px;
text-align:center;
}

/* TEMPLATES */
.templates{
text-align:center;
margin-top:30px;
}

.template-btn{
margin:5px;
padding:8px 15px;
background:#111;
border-radius:10px;
}

/* PREVIEW */
.preview{
text-align:center;
margin-top:30px;
}

/* LOGIN MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111;
padding:20px;
border-radius:15px;
}

/* HIDDEN PDF AREA */
#pdfArea{
display:none;
width:210mm;
min-height:297mm;
background:#fff;
color:#000;
padding:20mm;
}
</style>
</head>

<body>

<nav>
<div class="logo">Portify</div>
<button onclick="openLogin()">Login</button>
</nav>

<div class="form">
<input id="name" placeholder="Full Name">
<input id="age" placeholder="Age">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<textarea id="skills" placeholder="Skills"></textarea>
<textarea id="interests" placeholder="Interests"></textarea>

<button onclick="generate()">Generate Portfolio</button>
</div>

<div class="upload-box">
<p>Upload Resume / Certifications</p>
<input type="file" multiple>
</div>

<div class="templates">
<h3>Choose your preferred template</h3>
<button class="template-btn" onclick="setTemplate('classic')">Classic</button>
<button class="template-btn" onclick="setTemplate('sidebar')">Sidebar</button>
<button class="template-btn" onclick="setTemplate('grid')">Grid</button>
<button class="template-btn" onclick="setTemplate('minimal')">Minimal</button>
<button class="template-btn" onclick="setTemplate('creative')">Creative</button>
</div>

<div class="preview">
<button onclick="downloadPDF()">Download PDF</button>
</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="modal-content">
<h3>Login</h3>
<input placeholder="Email">
<input placeholder="Password">
<button onclick="closeLogin()">Login</button>
</div>
</div>

<!-- PDF CONTENT -->
<div id="pdfArea"></div>

<script>
let selectedTemplate = "classic";

function setTemplate(t){
selectedTemplate = t;
alert("Template selected: "+t);
}

/* GENERATE */
function generate(){
const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const phone = document.getElementById("phone").value;
const skills = document.getElementById("skills").value;
const interests = document.getElementById("interests").value;

let html = "";

/* CLASSIC */
if(selectedTemplate==="classic"){
html = `
<h1>${name}</h1>
<p>${email} | ${phone}</p>
<hr>
<h3>Skills</h3><p>${skills}</p>
<h3>Interests</h3><p>${interests}</p>
`;
}

/* SIDEBAR */
if(selectedTemplate==="sidebar"){
html = `
<div style="display:flex">
<div style="width:30%;background:#333;color:#fff;padding:10px">
<h2>${name}</h2>
<p>${email}</p>
<p>${phone}</p>
</div>
<div style="width:70%;padding:10px">
<h3>Skills</h3><p>${skills}</p>
<h3>Interests</h3><p>${interests}</p>
</div>
</div>
`;
}

/* GRID */
if(selectedTemplate==="grid"){
html = `
<div style="display:grid;grid-template-columns:1fr 1fr">
<div><h3>Name</h3><p>${name}</p></div>
<div><h3>Contact</h3><p>${phone}</p></div>
<div><h3>Email</h3><p>${email}</p></div>
<div><h3>Skills</h3><p>${skills}</p></div>
</div>
`;
}

/* MINIMAL */
if(selectedTemplate==="minimal"){
html = `<h1>${name}</h1><p>${email}</p><p>${skills}</p>`;
}

/* CREATIVE */
if(selectedTemplate==="creative"){
html = `
<div style="border-left:10px solid purple;padding-left:10px">
<h1>${name}</h1>
<p>${email} | ${phone}</p>
<h3>Skills</h3><p>${skills}</p>
<h3>Interests</h3><p>${interests}</p>
</div>
`;
}

document.getElementById("pdfArea").innerHTML = html;
}

/* PDF EXPORT */
function downloadPDF(){
const element = document.getElementById("pdfArea");

html2pdf().from(element).set({
margin:0,
filename:"portfolio.pdf",
html2canvas:{scale:2},
jsPDF:{unit:'mm',format:'a4'}
}).save();
}

/* LOGIN */
function openLogin(){
document.getElementById("loginModal").style.display="flex";
}
function closeLogin(){
document.getElementById("loginModal").style.display="none";
alert("Demo login");
}
</script>

</body>
</html>
