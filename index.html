<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portify - Portfolio Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  font-family: Arial;
  background:#111;
  color:#fff;
  text-align:center;
  padding:20px;
}

input, textarea{
  width:90%;
  padding:10px;
  margin:5px;
}

button{
  padding:10px 20px;
  margin:10px;
  cursor:pointer;
}

/* ===== PDF AREA ===== */
#portfolio{
  display:none;
  width:210mm;
  min-height:297mm;
  background:#fff;
  color:#000;
  padding:20mm;
  margin:auto;
}

/* ===== TEMPLATE 1: CLASSIC ===== */
.classic h1{
  text-align:center;
  border-bottom:2px solid black;
}

/* ===== TEMPLATE 2: SIDEBAR ===== */
.sidebar{
  display:flex;
}
.sidebar .left{
  width:30%;
  background:#333;
  color:#fff;
  padding:10px;
}
.sidebar .right{
  width:70%;
  padding:10px;
}

/* ===== TEMPLATE 3: GRID ===== */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* ===== TEMPLATE 4: MINIMAL ===== */
.minimal h1{
  font-weight:300;
}

/* ===== TEMPLATE 5: CREATIVE ===== */
.creative{
  border-left:10px solid purple;
  padding-left:10px;
}
</style>
</head>

<body>

<h1>Portify</h1>

<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">

<textarea id="skills" placeholder="Skills"></textarea>
<textarea id="interests" placeholder="Interests"></textarea>

<p>Upload Resume / Certifications</p>
<input type="file" multiple>

<h3>Choose Template</h3>
<button onclick="setTemplate('classic')">Classic</button>
<button onclick="setTemplate('sidebar')">Sidebar</button>
<button onclick="setTemplate('grid')">Grid</button>
<button onclick="setTemplate('minimal')">Minimal</button>
<button onclick="setTemplate('creative')">Creative</button>

<br>
<button onclick="generate()">Generate</button>

<div id="portfolio"></div>

<br>
<button onclick="downloadPDF()">Download PDF</button>

<script>
let template = "classic";

function setTemplate(t){
  template = t;
}

/* GENERATE PORTFOLIO */
function generate(){
  const name = nameInput = document.getElementById('name').value;
  const age = document.getElementById('age').value;
  const email = document.getElementById('email').value;
  const phone = document.getElementById('phone').value;
  const skills = document.getElementById('skills').value;
  const interests = document.getElementById('interests').value;

  let html = "";

  if(template === "classic"){
    html = `
      <div class="classic">
        <h1>${name}</h1>
        <p>${email} | ${phone}</p>
        <h3>Skills</h3>
        <p>${skills}</p>
        <h3>Interests</h3>
        <p>${interests}</p>
      </div>
    `;
  }

  if(template === "sidebar"){
    html = `
      <div class="sidebar">
        <div class="left">
          <h2>${name}</h2>
          <p>${email}</p>
          <p>${phone}</p>
        </div>
        <div class="right">
          <h3>Skills</h3>
          <p>${skills}</p>
          <h3>Interests</h3>
          <p>${interests}</p>
        </div>
      </div>
    `;
  }

  if(template === "grid"){
    html = `
      <div class="grid">
        <div><h2>Name</h2><p>${name}</p></div>
        <div><h2>Contact</h2><p>${phone}</p></div>
        <div><h2>Email</h2><p>${email}</p></div>
        <div><h2>Skills</h2><p>${skills}</p></div>
        <div><h2>Interests</h2><p>${interests}</p></div>
      </div>
    `;
  }

  if(template === "minimal"){
    html = `
      <div class="minimal">
        <h1>${name}</h1>
        <p>${email}</p>
        <h3>Skills</h3>
        <p>${skills}</p>
      </div>
    `;
  }

  if(template === "creative"){
    html = `
      <div class="creative">
        <h1>${name}</h1>
        <p>${email} | ${phone}</p>
        <h3>Skills</h3>
        <p>${skills}</p>
        <h3>Interests</h3>
        <p>${interests}</p>
      </div>
    `;
  }

  const portfolio = document.getElementById("portfolio");
  portfolio.innerHTML = html;
  portfolio.style.display = "block";
}

/* PDF EXPORT */
function downloadPDF(){
  const element = document.getElementById('portfolio');

  html2pdf().from(element).set({
    margin: 0,
    filename: 'portfolio.pdf',
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'mm', format: 'a4' }
  }).save();
}
</script>

</body>
</html>
